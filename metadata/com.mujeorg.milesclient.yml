Name: Miles Client
AutoName: Miles Client
Summary: Real-time location tracking for field agents
Description: |
  Miles Client is a mobile companion app for the Miles CRM system.
  It provides real-time location tracking for field agents, push
  notifications for lead assignments, and offline capabilities.

  Features:
  * Real-time GPS tracking with background location service
  * Push notifications via OneSignal
  * Secure authentication with JWT tokens
  * Lead management and status updates
  * Works with Netlify-hosted CRM backend

  Note: This app connects to a proprietary backend service (CRM).

RepoType: git
Repo: https://github.com/mujehoxe/miles-client.git

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: v1.0.0
    subdir: android
    init:
      - cd .. && npm ci
      - cd .. && npx expo prebuild --platform android
    gradle:
      - yes
    output: app/build/outputs/apk/release/app-release-unsigned.apk
    rm:
      - node_modules
    prebuild:
      - export EXPO_PUBLIC_BASE_URL=https://earnest-jelly-104eb3.netlify.app

AutoUpdateMode: Version
UpdateCheckMode: Tags
