Summary: Real-time location tracking for field agents
Description: |
  Miles Client is a mobile companion app for the Miles CRM system.
  It provides real-time location tracking for field agents, push
  notifications for lead assignments, and offline capabilities.

  Features:
  * Real-time GPS tracking with background location service
  * Push notifications via OneSignal
  * Secure authentication with JWT tokens
  * Lead management and status updates
  * Works with Netlify-hosted CRM backend

